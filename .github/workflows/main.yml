name: Auto Merge to Main as Lic-AlexGomez

on:
  push:
    branches:
      - kd

permissions:
  contents: write

concurrency:
  group: auto-merge-backend-to-main
  cancel-in-progress: false

jobs:
  merge-to-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Lic-AlexGomez identity
        run: |
          git config user.name "Lic-AlexGomez"
          git config user.email "delinuat@gmail.com"

      - name: Merge pushed branch into main
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
          GIT_AUTHOR_NAME: Lic-AlexGomez
          GIT_AUTHOR_EMAIL: delinuat@gmail.com
          GIT_COMMITTER_NAME: Lic-AlexGomez
          GIT_COMMITTER_EMAIL: delinuat@gmail.com
        run: |
          set -euo pipefail

          git fetch origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/heads/${SOURCE_BRANCH}:refs/remotes/origin/${SOURCE_BRANCH}"

          git checkout -B main origin/main

          git merge \
            --no-ff \
            --no-edit \
            -m "Merge ${SOURCE_BRANCH} into main" \
            "origin/${SOURCE_BRANCH}"

          echo "New main commit:"
          git log -1 --format="Author: %an <%ae>%nCommitter: %cn <%ce>%nMessage: %s"

          git push origin HEAD:main
